<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Results | Votify Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        'primary': '#14b8a6', 
                        'sidebar': '#1e293b', 
                        'body-bg': '#0f172a'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-bg font-inter text-slate-100 min-h-screen">

    <!-- Sidebar Navigation -->
    <aside class="fixed top-0 left-0 bottom-0 w-72 bg-sidebar border-r border-white/5 text-white z-50 shadow-2xl">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-primary flex items-center justify-center rounded-xl shadow-lg">
                <i data-lucide="vote" class="text-white w-6 h-6"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter text-white">Votify<span class="text-primary">.</span></span>
        </div>

        <nav class="px-6 mt-6 space-y-1">
            <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Administration</p>
            <a href="admin.html" class="sidebar-item">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="manage-elections.html" class="sidebar-item">
                <i data-lucide="calendar" class="w-5 h-5"></i> Elections
            </a>
            <a href="manage-candidates.html" class="sidebar-item">
                <i data-lucide="users" class="w-5 h-5"></i> Candidates
            </a>
            <div class="pt-8 px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Analytics</div>
            <a href="results.html" class="sidebar-item active">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Results
            </a>
        </nav>

        <div class="absolute bottom-8 left-6 right-6">
            <button onclick="api.logout()" class="sidebar-item w-full hover:text-red-400">
                <i data-lucide="log-out" class="w-5 h-5"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="ml-72 p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="admin-heading-1">Election Intelligence</h1>
                <p class="admin-subheading">Real-time telemetry and cryptographic result verification</p>
            </div>
            <div class="px-6 py-3 bg-white rounded-xl shadow-sm border border-slate-100 flex items-center gap-3 text-sidebar">
                <div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
                <span class="text-sm font-bold opacity-80">Live Sync Active</span>
            </div>
        </header>

        <div id="resultsGrid" class="grid lg:grid-cols-2 gap-8">
            <!-- Loading state -->
            <div class="col-span-full py-20 text-center admin-card !bg-slate-50 border-dashed border-slate-200 shadow-none">
                <p class="text-slate-400 font-bold uppercase tracking-widest italic animate-pulse">Decrypting result packets...</p>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/dashboard.js"></script>
    <script>
        lucide.createIcons();
        const user = api.getUser();
        if (!user || user.role !== 'admin') window.location.href = 'login.html';

        loadResults();
    </script>
</body>
</html>
