<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Registry | Votify Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'saas-blue': '#1e3a8a', 'saas-teal': '#14b8a6', 'saas-slate': '#0f172a' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#0B1F3A] text-slate-100 font-inter min-h-screen pb-20">

    <nav class="bg-[#112947] border-b border-white/10 py-6 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="/" class="w-10 h-10 bg-teal-600 flex items-center justify-center rounded-xl shadow-lg">
                    <i data-lucide="vote" class="text-white w-6 h-6"></i>
                </a>
                <h1 class="text-2xl font-extrabold text-white tracking-tight">Results Registry</h1>
            </div>
            <a href="dashboard.html" id="backBtn" class="btn-primary px-6 py-2.5 text-sm bg-teal-600 hover:bg-teal-500 text-white rounded-xl transition-all">Return to Terminal</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-12">
        <div class="saas-card bg-teal-600 p-10 text-white mb-12 flex flex-col md:flex-row justify-between items-center gap-8 overflow-hidden relative rounded-2xl border border-white/10 shadow-2xl">
            <div class="absolute -bottom-10 -right-10 opacity-10">
                <i data-lucide="bar-chart" class="w-64 h-64"></i>
            </div>
            <div class="relative z-10">
                <h2 class="text-3xl font-extrabold mb-4 uppercase tracking-tighter">Election Intelligence</h2>
                <p class="text-teal-50 max-w-lg font-medium opacity-90">Verify democratic outcomes with cryptographically sealed results and real-time telemetry analytics.</p>
            </div>
            <div class="flex gap-4 relative z-10">
                <div class="text-center bg-white/10 px-6 py-4 rounded-2xl border border-white/10 backdrop-blur-sm">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-teal-100 mb-1">Status</p>
                    <p class="font-extrabold">Authenticated</p>
                </div>
                <div class="text-center bg-white/10 px-6 py-4 rounded-2xl border border-white/10 backdrop-blur-sm">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-teal-100 mb-1">Method</p>
                    <p class="font-extrabold">Public Audit</p>
                </div>
            </div>
        </div>

        <div id="resultsGrid" class="grid lg:grid-cols-2 gap-8">
            <!-- Loading state -->
            <div class="col-span-full py-20 text-center saas-card bg-[#112947] border border-white/10 rounded-2xl">
                <p class="text-slate-500 font-bold uppercase tracking-widest italic">Decrypting result packets...</p>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/dashboard.js"></script>
    <script>
        lucide.createIcons();
        const user = api.getUser();
        if (user && user.role === 'admin') {
            document.getElementById('backBtn').href = 'admin.html';
        }

        loadResults();
    </script>
</body>
</html>
