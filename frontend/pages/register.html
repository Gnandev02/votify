<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Registration | Votify Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'saas-blue': '#1e3a8a', 'saas-teal': '#14b8a6' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#0B1F3A] text-slate-100 min-h-screen flex items-center justify-center p-6 font-inter">

    <div class="max-w-md w-full reveal-up">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 mb-6">
                <div class="w-12 h-12 bg-teal-600 flex items-center justify-center rounded-xl shadow-lg">
                    <i data-lucide="vote" class="text-white w-7 h-7"></i>
                </div>
                <span class="text-3xl font-extrabold tracking-tight text-white">Votify</span>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Create Your Account</h2>
            <p class="text-sm text-slate-400 font-medium tracking-wide uppercase">Join the secure voting platform</p>
        </div>

        <form id="registerForm" class="saas-card p-10 space-y-7 bg-[#112947] border border-white/10 rounded-2xl shadow-2xl">
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Full Name</label>
                    <div class="relative group">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-teal-400 transition-colors"></i>
                        <input type="text" id="name" required class="w-full bg-[#0E2340] border border-white/10 rounded-xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all font-medium text-white" placeholder="Authorized User">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Email Address</label>
                    <div class="relative group">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-teal-400 transition-colors"></i>
                        <input type="email" id="email" required class="w-full bg-[#0E2340] border border-white/10 rounded-xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all font-medium text-white" placeholder="name@company.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Password</label>
                    <div class="relative group">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-teal-400 transition-colors"></i>
                        <input type="password" id="password" required class="w-full bg-[#0E2340] border border-white/10 rounded-xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all font-medium text-white" placeholder="••••••••">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 pt-2">
                    <button type="button" onclick="setRole('voter')" id="roleVoter" class="role-btn text-xs font-bold uppercase tracking-widest py-3.5 rounded-xl border-2 border-teal-500 bg-teal-500/10 text-teal-400 transition-all shadow-sm">Voter</button>
                    <button type="button" onclick="setRole('admin')" id="roleAdmin" class="role-btn text-xs font-bold uppercase tracking-widest py-3.5 rounded-xl border-2 border-white/5 text-slate-500 hover:border-white/10 transition-all">Admin</button>
                </div>
            </div>

            <button type="submit" class="btn-primary w-full py-4 text-base font-bold shadow-lg mt-4 bg-teal-600 hover:bg-teal-500 text-white rounded-xl transition-all">
                Create Account <i data-lucide="chevron-right" class="w-5 h-5 inline-block ml-1"></i>
            </button>

            <p class="text-sm font-bold text-center text-slate-400 pt-6 border-t border-white/5">
                Already have an account? <a href="login.html" class="text-teal-400 hover:underline">Log in</a>
            </p>
        </form>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        lucide.createIcons();
        setTimeout(() => {
            document.querySelector('.reveal-up').classList.add('visible');
        }, 100);

        window.selectedRole = 'voter';

        function setRole(role) {
            window.selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('border-teal-500', 'bg-teal-500/10', 'text-teal-400', 'shadow-sm');
                btn.classList.add('border-white/5', 'text-slate-500');
            });
            const activeBtn = document.getElementById(role === 'admin' ? 'roleAdmin' : 'roleVoter');
            activeBtn.classList.add('border-teal-500', 'bg-teal-500/10', 'text-teal-400', 'shadow-sm');
            activeBtn.classList.remove('border-white/5', 'text-slate-500');
        }
    </script>
</body>
</html>
