<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Candidates | Votify Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        'primary': '#14b8a6', 
                        'sidebar': '#1e293b', 
                        'body-bg': '#0f172a'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-bg font-inter text-slate-100 min-h-screen">

    <!-- Sidebar Navigation -->
    <aside class="fixed top-0 left-0 bottom-0 w-72 bg-sidebar border-r border-white/5 text-white z-50 shadow-2xl">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-primary flex items-center justify-center rounded-xl shadow-lg">
                <i data-lucide="vote" class="text-white w-6 h-6"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter text-white">Votify<span class="text-primary">.</span></span>
        </div>

        <nav class="px-6 mt-6 space-y-1">
            <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Administration</p>
            <a href="admin.html" class="sidebar-item">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="manage-elections.html" class="sidebar-item">
                <i data-lucide="calendar" class="w-5 h-5"></i> Elections
            </a>
            <a href="manage-candidates.html" class="sidebar-item active">
                <i data-lucide="users" class="w-5 h-5"></i> Candidates
            </a>
            <div class="pt-8 px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Analytics</div>
            <a href="results.html" class="sidebar-item">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Results
            </a>
        </nav>

        <div class="absolute bottom-8 left-6 right-6">
            <button onclick="api.logout()" class="sidebar-item w-full hover:text-red-400">
                <i data-lucide="log-out" class="w-5 h-5"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="ml-72 p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="admin-heading-1">Candidate Registry</h1>
                <p class="admin-subheading">Verify and authorize participants for specific sessions</p>
            </div>
            <button onclick="document.getElementById('candidateModal').classList.remove('hidden')" class="admin-btn-teal shadow-xl border-none">
                Register Candidate <i data-lucide="user-plus" class="w-5 h-5"></i>
            </button>
        </header>

        <div class="admin-card !p-0 overflow-hidden">
            <div class="bg-slate-50/50 border-b border-slate-100 px-8 py-5">
                <p class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Authorized Participants</p>
            </div>
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-slate-100">
                        <th class="px-8 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Participant Name</th>
                        <th class="px-8 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Active Session</th>
                        <th class="px-8 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="candidatesTable" class="text-sidebar">
                    <tr>
                        <td colspan="3" class="px-8 py-12 text-center text-slate-400 font-bold uppercase tracking-widest italic">Syncing candidate packets...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Candidate Modal -->
    <div id="candidateModal" class="fixed inset-0 bg-body-bg/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="admin-card w-full max-w-xl !p-0 overflow-hidden reveal-up shadow-2xl border-none">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="text-xl font-bold text-sidebar">Register Candidate</h3>
                <button onclick="document.getElementById('candidateModal').classList.add('hidden')" class="p-2 text-slate-400 hover:text-red-400 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="candidateForm" class="p-10 space-y-8">
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Target Election Session</label>
                        <select id="electionId" required class="w-full bg-slate-50 border border-slate-200 rounded-xl py-4 px-5 text-sm text-sidebar focus:outline-none focus:border-primary transition-all font-medium appearance-none">
                            <option value="">Select Session...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Full Legal Name</label>
                        <input type="text" id="name" required class="w-full bg-slate-50 border border-slate-200 rounded-xl py-4 px-5 text-sm text-sidebar focus:outline-none focus:border-primary transition-all font-medium placeholder:text-slate-400" placeholder="Authorized Candidate Name">
                    </div>
                </div>
                <button type="submit" class="admin-btn-teal w-full justify-center py-4 text-base shadow-xl">
                    Authorize Participant
                </button>
            </form>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        lucide.createIcons();
        const user = api.getUser();
        if (!user || user.role !== 'admin') window.location.href = 'login.html';

        async function loadData() {
            try {
                const elections = await api.get('/elections');
                const select = document.getElementById('electionId');
                select.innerHTML += elections.map(e => `<option value="${e.id}">${e.title}</option>`).join('');

                const candidatesPromises = elections.map(e => api.get(`/candidates?election_id=${e.id}`).catch(() => []));
                const allCandidatesGrouped = await Promise.all(candidatesPromises);
                
                const tbody = document.getElementById('candidatesTable');
                let html = '';
                
                elections.forEach((e, idx) => {
                    const candidates = allCandidatesGrouped[idx];
                    candidates.forEach(c => {
                        html += `
                            <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                <td class="px-8 py-6">
                                    <p class="font-bold text-sidebar">${c.name}</p>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Auth ID: C-${c.id}</p>
                                </td>
                                <td class="px-8 py-6">
                                    <span class="px-3 py-1 bg-primary/10 text-primary text-[10px] font-black uppercase tracking-widest rounded-full border border-primary/20">${e.title}</span>
                                </td>
                                <td class="px-8 py-6 text-right">
                                    <button onclick="deleteCandidate(${e.id}, ${c.id})" class="text-slate-400 hover:text-red-500 transition-colors p-2">
                                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                });
                
                tbody.innerHTML = html || '<tr><td colspan="3" class="px-8 py-12 text-center text-slate-400 font-bold uppercase tracking-widest">No candidates authorized</td></tr>';
                lucide.createIcons();
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('candidateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            try {
                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Authorizing...';
                lucide.createIcons();
                await api.post('/candidates?action=add', { 
                    election_id: document.getElementById('electionId').value,
                    name: document.getElementById('name').value
                });
                document.getElementById('candidateModal').classList.add('hidden');
                loadData();
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerHTML = 'Authorize Participant';
            }
        });

        async function deleteCandidate(electionId, candidateId) {
            if (!confirm('Revoke this participant\'s authorization?')) return;
            try {
                await api.post('/candidates?action=delete', { election_id: electionId, candidate_id: candidateId });
                loadData();
            } catch (err) {
                alert(err.message);
            }
        }

        loadData();
    </script>
</body>
</html>
