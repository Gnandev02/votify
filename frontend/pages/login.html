<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Login | Votify Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'saas-blue': '#1e3a8a', 'saas-teal': '#14b8a6' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#0B1F3A] text-slate-100 min-h-screen flex items-center justify-center p-6 font-inter">

    <div class="max-w-md w-full reveal-up">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 mb-6">
                <div class="w-12 h-12 bg-teal-600 flex items-center justify-center rounded-xl shadow-lg">
                    <i data-lucide="vote" class="text-white w-7 h-7"></i>
                </div>
                <span class="text-3xl font-extrabold tracking-tight text-white">Votify</span>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Welcome Back</h2>
            <p class="text-sm text-slate-400 font-medium tracking-wide uppercase">Enter your credentials to access the portal</p>
        </div>

        <form id="loginForm" class="saas-card p-10 space-y-8 bg-[#112947] border border-white/10 rounded-2xl shadow-2xl">
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Email Address</label>
                    <div class="relative group">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-teal-400 transition-colors"></i>
                        <input type="email" id="email" required class="w-full bg-[#0E2340] border border-white/10 rounded-xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all font-medium text-white" placeholder="name@company.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Password</label>
                    <div class="relative group">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-teal-400 transition-colors"></i>
                        <input type="password" id="password" required class="w-full bg-[#0E2340] border border-white/10 rounded-xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all font-medium text-white" placeholder="••••••••">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary w-full py-4 text-base font-bold shadow-lg mt-4 bg-teal-600 hover:bg-teal-500 text-white rounded-xl transition-all">
                Sign In to Platform
            </button>

            <div class="flex flex-col gap-4 text-center pt-6 border-t border-white/5">
                <a href="register.html" class="text-sm font-bold text-teal-400 hover:text-teal-300 transition-colors">New to Votify? Create Account</a>
                <a href="#" class="text-xs font-semibold text-slate-500 uppercase tracking-widest hover:text-slate-400 transition-colors">Forgot Password?</a>
            </div>
        </form>
        
        <div class="mt-8 flex items-center justify-center gap-2 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">
            <i data-lucide="shield" class="w-3 h-3 text-teal-500"></i> SSL Encrypted Connection
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        lucide.createIcons();
        // Fixed class name from reveal-up-active to visible
        setTimeout(() => {
            document.querySelector('.reveal-up').classList.add('visible');
        }, 100);
    </script>
</body>
</html>
