<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Login | Votify Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'saas-blue': '#1e3a8a', 'saas-teal': '#14b8a6' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex items-center justify-center p-6 font-inter">

    <div class="max-w-md w-full reveal-up">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 mb-6">
                <div class="w-12 h-12 bg-saas-blue flex items-center justify-center rounded-xl shadow-lg">
                    <i data-lucide="vote" class="text-white w-7 h-7"></i>
                </div>
                <span class="text-3xl font-extrabold tracking-tight text-saas-blue">Votify</span>
            </div>
            <h2 class="text-2xl font-bold text-slate-900 mb-2">Welcome Back</h2>
            <p class="text-sm text-slate-500 font-medium tracking-wide uppercase">Enter your credentials to access the portal</p>
        </div>

        <form id="loginForm" class="saas-card p-10 space-y-8 bg-white">
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Email Address</label>
                    <div class="relative group">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-saas-blue transition-colors"></i>
                        <input type="email" id="email" required class="w-full bg-slate-50 border border-slate-200 rounded-xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-saas-blue focus:ring-4 focus:ring-blue-500/10 transition-all font-medium" placeholder="name@company.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Password</label>
                    <div class="relative group">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-saas-blue transition-colors"></i>
                        <input type="password" id="password" required class="w-full bg-slate-50 border border-slate-200 rounded-xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-saas-blue focus:ring-4 focus:ring-blue-500/10 transition-all font-medium" placeholder="••••••••">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-saas-primary w-full py-4 text-base shadow-lg mt-4">
                Sign In to Platform
            </button>

            <div class="flex flex-col gap-4 text-center pt-6 border-t border-slate-50">
                <a href="register.html" class="text-sm font-bold text-saas-blue hover:text-saas-teal transition-colors">New to Votify? Create Account</a>
                <a href="#" class="text-xs font-semibold text-slate-400 uppercase tracking-widest hover:text-slate-600 transition-colors">Forgot Password?</a>
            </div>
        </form>
        
        <div class="mt-8 flex items-center justify-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">
            <i data-lucide="shield" class="w-3 h-3"></i> SSL Encrypted Connection
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        lucide.createIcons();
        document.querySelector('.reveal-up').classList.add('reveal-up-active');
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            try {
                btn.disabled = true;
                btn.innerHTML = 'Connecting to Vault...';
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                const data = await api.post('/auth/login', { email, password });
                api.saveAuth(data.user, data.token);
                
                window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
            } catch (err) {
                alert(err.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
