<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ballot Secure | Votify Voting Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'saas-blue': '#1e3a8a', 'saas-teal': '#14b8a6', 'saas-slate': '#0f172a' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .candidate-card.selected { border-color: #2A9D8F; background-color: rgba(42,157,143,0.1); box-shadow: 0 0 0 4px rgba(42, 157, 143, 0.1); }
        .candidate-card.selected .check-mark { background-color: #2A9D8F; color: white; transform: scale(1.1); }
    </style>
</head>
<body class="bg-[#0B1F3A] text-slate-100 font-inter min-h-screen pb-32">

    <nav class="bg-[#112947] border-b border-white/10 py-6 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="p-2 text-slate-400 hover:text-teal-400 transition-colors">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <div>
                    <h1 id="electionTitle" class="text-xl font-extrabold text-white tracking-tight">Accessing Ballot...</h1>
                    <p class="text-[10px] font-bold text-teal-400 uppercase tracking-[0.2em] italic">Identity verified • Session secure</p>
                </div>
            </div>
            <div class="flex items-center gap-4 text-xs font-bold text-slate-500 uppercase tracking-widest hidden sm:flex">
                <span>Phase 1/2</span>
                <div class="w-24 h-2 bg-[#0E2340] rounded-full overflow-hidden">
                    <div class="w-1/2 h-full bg-teal-600"></div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 mt-16">
        <div class="text-center mb-12">
            <div class="w-16 h-16 bg-teal-600/20 text-teal-400 flex items-center justify-center rounded-3xl mx-auto mb-6 shadow-sm border border-teal-500/20">
                <i data-lucide="shield-check" class="w-8 h-8"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-white mb-4">Official Ballot Selection</h2>
            <p class="text-slate-400 font-medium">Please select one candidate from the list below. Your choice is encrypted and anonymous.</p>
        </div>

        <div id="candidatesList" class="space-y-4">
            <!-- Loading state -->
            <div class="p-12 text-center saas-card bg-[#112947] border border-white/10 rounded-2xl">
                <p class="text-slate-500 font-bold uppercase tracking-widest italic">Opening ballot vault...</p>
            </div>
        </div>

        <div class="mt-16 text-center reveal-up">
            <button id="submitVote" disabled class="btn-primary px-16 py-5 text-lg shadow-2xl opacity-50 cursor-not-allowed bg-teal-600 hover:bg-teal-500 text-white rounded-xl transition-all">
                Cast Encrypted Ballot <i data-lucide="lock" class="w-5 h-5 ml-2"></i>
            </button>
            <p class="mt-8 text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">Signature required for transmission</p>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script>
        lucide.createIcons();
        const user = api.getUser();
        if (!user || user.role !== 'voter') window.location.href = 'login.html';
        
        const urlParams = new URLSearchParams(window.location.search);
        const electionId = urlParams.get('id');
        if (!electionId) window.location.href = 'dashboard.html';

        let selectedCandidateId = null;

        async function loadBallot() {
            try {
                const elections = await api.get('/elections/list');
                const election = elections.find(e => e.id == electionId);
                if (!election) throw new Error('Session invalid');
                
                document.getElementById('electionTitle').textContent = election.title;
                
                const candidates = await api.get(`/elections/candidates?id=${electionId}`);
                const list = document.getElementById('candidatesList');
                
                list.innerHTML = candidates.map(c => `
                    <div onclick="selectCandidate(${c.id})" id="candidate-${c.id}" class="candidate-card saas-card p-6 flex items-center justify-between cursor-pointer group hover:bg-slate-50 transition-all border-2 border-transparent">
                        <div class="flex items-center gap-6">
                            <div class="w-14 h-14 bg-white rounded-2xl border border-slate-200 flex items-center justify-center overflow-hidden shadow-sm">
                                <i data-lucide="user" class="text-slate-300 w-8 h-8"></i>
                            </div>
                            <div>
                                <h4 class="text-lg font-bold text-slate-900 group-hover:text-saas-blue transition-colors">${c.name}</h4>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Authorized Participant</p>
                            </div>
                        </div>
                        <div class="check-mark w-8 h-8 border-2 border-slate-200 rounded-full flex items-center justify-center transition-all">
                            <i data-lucide="check" class="w-5 h-5 opacity-0 group-[.selected]:opacity-100"></i>
                        </div>
                    </div>
                `).join('') || '<p class="text-center py-10 text-slate-400 font-bold uppercase tracking-widest">No candidates found</p>';
                lucide.createIcons();
                setTimeout(() => {
                    document.querySelector('.reveal-up').classList.add('visible');
                }, 100);
            } catch (err) {
                alert(err.message);
                window.location.href = 'dashboard.html';
            }
        }

        function selectCandidate(id) {
            selectedCandidateId = id;
            document.querySelectorAll('.candidate-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`candidate-${id}`).classList.add('selected');
            
            const btn = document.getElementById('submitVote');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        document.getElementById('submitVote').addEventListener('click', async () => {
            const btn = document.getElementById('submitVote');
            try {
                btn.disabled = true;
                btn.innerHTML = 'Broadcasting Ballot...';
                
                await api.post('/vote/cast', { electionId, candidateId: selectedCandidateId });
                alert('Ballot cast and cryptographically sealed. Thank you for participating.');
                window.location.href = 'results.html';
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerHTML = 'Cast Encrypted Ballot <i data-lucide="lock" class="w-5 h-5 ml-2"></i>';
                lucide.createIcons();
            }
        });

        loadBallot();
    </script>
</body>
</html>
