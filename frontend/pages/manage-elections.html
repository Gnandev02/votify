<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elections Registry | Votify Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'saas-blue': '#1e3a8a', 'saas-teal': '#14b8a6', 'saas-slate': '#0f172a' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#0B1F3A] text-slate-100 font-inter min-h-screen">

    <aside class="fixed top-0 left-0 bottom-0 w-72 bg-[#112947] border-r border-white/10 text-white z-50 shadow-2xl">
        <div class="p-8 pb-12 flex items-center gap-3">
            <div class="w-10 h-10 bg-teal-600 flex items-center justify-center rounded-xl shadow-lg">
                <i data-lucide="vote" class="text-white w-6 h-6"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter text-white">Votify<span class="text-teal-400">.</span></span>
        </div>

        <nav class="px-4 space-y-2">
            <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Administration</p>
            <a href="admin.html" class="flex items-center gap-4 px-4 py-3.5 text-slate-400 hover:bg-white/5 hover:text-white rounded-xl transition-all">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="manage-elections.html" class="flex items-center gap-4 px-4 py-3.5 bg-teal-600 text-white rounded-xl font-semibold shadow-lg shadow-teal-900/20">
                <i data-lucide="calendar" class="w-5 h-5"></i> Elections
            </a>
            <a href="manage-candidates.html" class="flex items-center gap-4 px-4 py-3.5 text-slate-400 hover:bg-white/5 hover:text-white rounded-xl transition-all">
                <i data-lucide="users" class="w-5 h-5"></i> Candidates
            </a>
            <div class="pt-8 px-4 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Intelligence</div>
            <a href="results.html" class="flex items-center gap-4 px-4 py-3.5 text-slate-400 hover:bg-white/5 hover:text-white rounded-xl transition-all">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Results
            </a>
        </nav>

        <div class="absolute bottom-8 left-4 right-4 text-center">
            <p class="text-[10px] font-bold text-slate-600 uppercase tracking-widest pb-4 font-mono opacity-50">Secured Deployment</p>
        </div>
    </aside>

    <main class="ml-72 p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight">Elections Registry</h1>
                <p class="text-slate-400 font-medium">Commission and manage voting sessions</p>
            </div>
            <button onclick="document.getElementById('createModal').classList.remove('hidden')" class="btn-primary bg-teal-600 hover:bg-teal-500 text-white px-6 py-2.5 rounded-xl transition-all flex items-center gap-2">
                Commission Election <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </header>

        <div class="saas-card bg-[#112947] border border-white/10 rounded-2xl shadow-xl overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-white/5 border-b border-white/10">
                        <th class="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Election Title</th>
                        <th class="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Status</th>
                        <th class="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Creation Date</th>
                        <th class="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none flex justify-end">Actions</th>
                    </tr>
                </thead>
                <tbody id="electionsTable">
                    <tr>
                        <td colspan="4" class="px-8 py-12 text-center text-slate-500 font-bold uppercase tracking-widest italic">Scanning registry packets...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal -->
    <div id="createModal" class="fixed inset-0 bg-[#0B1F3A]/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="saas-card w-full max-w-xl p-0 overflow-hidden reveal-up bg-[#112947] border border-white/10 rounded-2xl shadow-2xl">
            <div class="p-8 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-xl font-bold text-white">Commission New Election</h3>
                <button onclick="document.getElementById('createModal').classList.add('hidden')" class="p-2 text-slate-500 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="electionForm" class="p-10 space-y-8">
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Official Title</label>
                        <input type="text" id="title" required class="w-full bg-[#0E2340] border border-white/10 rounded-xl py-4 px-5 text-sm text-white focus:outline-none focus:border-teal-500 transition-all font-medium" placeholder="E.g. Board of Representatives 2026">
                    </div>
                </div>
                <button type="submit" class="btn-primary w-full py-4 text-base shadow-xl bg-teal-600 hover:bg-teal-500 text-white rounded-xl transition-all font-bold">
                    Deploy Election Session
                </button>
            </form>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        lucide.createIcons();
        const user = api.getUser();
        if (!user || user.role !== 'admin') window.location.href = 'login.html';

        async function loadElections() {
            try {
                const elections = await api.get('/elections');
                const tbody = document.getElementById('electionsTable');
                
                tbody.innerHTML = elections.map(e => `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                        <td class="px-8 py-6">
                            <p class="font-bold text-white">${e.title}</p>
                            <p class="text-[10px] text-slate-500 font-medium uppercase tracking-[0.05em]">Session ID: ${e.id}</p>
                        </td>
                        <td class="px-8 py-6">
                            <span class="px-3 py-1 bg-emerald-600/10 text-emerald-400 text-[10px] font-bold uppercase tracking-widest rounded-full border border-emerald-500/20">Active</span>
                        </td>
                        <td class="px-8 py-6">
                            <p class="text-xs font-bold text-slate-400">${new Date(e.created_at || Date.now()).toLocaleDateString()}</p>
                        </td>
                        <td class="px-8 py-6 text-right">
                            <button onclick="deleteElection(${e.id})" class="text-slate-500 hover:text-red-400 transition-colors p-2">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="4" class="px-8 py-12 text-center text-slate-400 font-bold uppercase tracking-widest">No elections commissioned</td></tr>';
                lucide.createIcons();
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('electionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            try {
                btn.disabled = true;
                btn.innerHTML = 'Broadcasting Parameters...';
                await api.post('/elections?action=create', { 
                    title: document.getElementById('title').value,
                    start_date: new Date().toISOString(),
                    end_date: new Date(Date.now() + 86400000 * 7).toISOString() // Default 7 days
                });
                document.getElementById('createModal').classList.add('hidden');
                loadElections();
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerHTML = 'Deploy Election Session';
            }
        });

        async function deleteElection(id) {
            if (!confirm('Are you sure you want to decommission this session? This action is irreversible.')) return;
            try {
                await api.post('/elections?action=delete', { id });
                loadElections();
            } catch (err) {
                alert(err.message);
            }
        }

        loadElections();
    </script>
</body>
</html>
