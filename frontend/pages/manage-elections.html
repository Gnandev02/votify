<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Elections | Votify Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        'primary': '#14b8a6', 
                        'sidebar': '#020617', 
                        'body-bg': '#0f172a',
                        'slate-dark': '#1e293b',
                        'text-primary': '#e2e8f0',
                        'text-secondary': '#94a3b8'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-bg font-inter text-text-primary min-h-screen">

    <!-- Sidebar Navigation -->
    <aside class="fixed top-0 left-0 bottom-0 w-72 bg-sidebar border-r border-white/5 text-white z-50 shadow-2xl">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-primary flex items-center justify-center rounded-xl shadow-lg">
                <i data-lucide="vote" class="text-sidebar w-6 h-6"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter text-white">Votify<span class="text-primary">.</span></span>
        </div>

        <nav class="px-6 mt-6 space-y-1">
            <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Administration</p>
            <a href="admin.html" class="sidebar-item">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="manage-elections.html" class="sidebar-item active">
                <i data-lucide="calendar" class="w-5 h-5"></i> Elections
            </a>
            <a href="manage-candidates.html" class="sidebar-item">
                <i data-lucide="users" class="w-5 h-5"></i> Candidates
            </a>
            <div class="pt-8 px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Analytics</div>
            <a href="results.html" class="sidebar-item">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Results
            </a>
        </nav>

        <div class="absolute bottom-8 left-6 right-6">
            <button onclick="api.logout()" class="sidebar-item w-full hover:bg-red-500/10 hover:text-red-400">
                <i data-lucide="log-out" class="w-5 h-5"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="ml-72 p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="admin-heading-1">Elections Registry</h1>
                <p class="admin-subheading">Commission and manage all voting sessions</p>
            </div>
            <button onclick="document.getElementById('createModal').classList.remove('hidden')" class="admin-btn-teal shadow-xl border-none">
                Commission Election <i data-lucide="plus" class="w-5 h-5 ml-1"></i>
            </button>
        </header>

        <div class="admin-table-container">
            <div class="bg-white/5 border-b border-white/5 px-8 py-5">
                <p class="text-[10px] font-black text-text-secondary uppercase tracking-widest">Election Data Streams</p>
            </div>
            <table class="admin-table w-full text-left">
                <thead>
                    <tr>
                        <th class="text-[10px] font-bold text-text-secondary uppercase tracking-widest">Election Title</th>
                        <th class="text-[10px] font-bold text-text-secondary uppercase tracking-widest text-center">Status</th>
                        <th class="text-[10px] font-bold text-text-secondary uppercase tracking-widest">Created At</th>
                        <th class="text-[10px] font-bold text-text-secondary uppercase tracking-widest text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="electionsTable">
                    <tr>
                        <td colspan="4" class="px-8 py-12 text-center text-text-secondary font-bold uppercase tracking-widest italic">Scanning registry packets...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal -->
    <div id="createModal" class="fixed inset-0 bg-sidebar/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="admin-card w-full max-w-xl !p-0 overflow-hidden reveal-up shadow-2xl border-white/5">
            <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/2">
                <h3 class="text-xl font-bold text-text-primary">Commission New Election</h3>
                <button onclick="document.getElementById('createModal').classList.add('hidden')" class="p-2 text-text-secondary hover:text-red-400 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="electionForm" class="p-8 space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-text-secondary uppercase tracking-widest mb-3">Official Title</label>
                    <input type="text" id="title" required class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-5 text-sm text-text-primary focus:outline-none focus:border-primary transition-all font-medium placeholder:text-slate-600" placeholder="E.g. Presidential Election 2026">
                </div>
                <button type="submit" class="admin-btn-teal w-full justify-center py-4 text-base shadow-xl mt-4">
                    Deploy Election Session
                </button>
            </form>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        lucide.createIcons();
        const user = api.getUser();
        if (!user || user.role !== 'admin') window.location.href = 'login.html';

        async function loadElections() {
            try {
                const elections = await api.get('/elections');
                const tbody = document.getElementById('electionsTable');
                
                tbody.innerHTML = elections.map(e => `
                    <tr>
                        <td class="px-8 py-6">
                            <p class="font-bold text-text-primary">${e.title}</p>
                            <p class="text-[10px] text-text-secondary font-bold uppercase tracking-wider">Session ID: ${e.id}</p>
                        </td>
                        <td class="px-8 py-6 text-center">
                            <span class="px-3 py-1 bg-primary/10 text-primary text-[10px] font-black uppercase tracking-widest rounded-full border border-primary/20">Active</span>
                        </td>
                        <td class="px-8 py-6">
                            <p class="text-xs font-bold text-text-secondary">${new Date(e.created_at || Date.now()).toLocaleDateString()}</p>
                        </td>
                        <td class="px-8 py-6 text-right">
                            <button onclick="deleteElection(${e.id})" class="text-text-secondary hover:text-red-500 transition-colors p-2">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="4" class="px-8 py-12 text-center text-text-secondary font-bold uppercase tracking-widest">No elections found</td></tr>';
                lucide.createIcons();
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('electionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            try {
                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin mr-2"></i> Deploying...';
                lucide.createIcons();
                await api.post('/elections?action=create', { 
                    title: document.getElementById('title').value,
                    start_date: new Date().toISOString(),
                    end_date: new Date(Date.now() + 86400000 * 7).toISOString()
                });
                document.getElementById('createModal').classList.add('hidden');
                loadElections();
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerHTML = 'Deploy Election Session';
            }
        });

        async function deleteElection(id) {
            if (!confirm('Permanently decommission this election? All votes will be archived.')) return;
            try {
                await api.post('/elections?action=delete', { id });
                loadElections();
            } catch (err) {
                alert(err.message);
            }
        }

        loadElections();
    </script>
</body>
</html>
