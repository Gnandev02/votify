<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Access | Votify Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'saas-blue': '#1e3a8a', 'saas-teal': '#14b8a6' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#0B1F3A] text-slate-100 min-h-screen flex items-center justify-center p-6 font-inter">

    <div class="max-w-md w-full reveal-up">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 mb-6">
                <div class="w-12 h-12 bg-teal-600 flex items-center justify-center rounded-xl shadow-lg">
                    <i data-lucide="shield-check" class="text-white w-7 h-7"></i>
                </div>
                <span class="text-3xl font-extrabold tracking-tight text-white">Votify</span>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Security Verification</h2>
            <p class="text-sm text-slate-400 font-medium tracking-wide uppercase">Enter the 6-digit access code</p>
        </div>

        <form id="otpForm" class="saas-card p-10 space-y-8 bg-[#112947] border border-white/10 rounded-2xl shadow-2xl">
            <div class="text-center space-y-2">
                <p class="text-xs font-bold text-teal-400 uppercase tracking-[0.15em]">Verification Required</p>
                <p class="text-sm text-slate-400 leading-relaxed">
                    We've sent a 6-digit code to your email. Please enter it below to continue.
                </p>
            </div>

            <div class="grid grid-cols-6 gap-3" id="otpContainer">
                <input type="text" maxlength="1" class="otp-input w-full bg-[#0E2340] border border-white/10 rounded-xl py-5 text-center text-2xl font-black text-white focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all">
                <input type="text" maxlength="1" class="otp-input w-full bg-[#0E2340] border border-white/10 rounded-xl py-5 text-center text-2xl font-black text-white focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all">
                <input type="text" maxlength="1" class="otp-input w-full bg-[#0E2340] border border-white/10 rounded-xl py-5 text-center text-2xl font-black text-white focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all">
                <input type="text" maxlength="1" class="otp-input w-full bg-[#0E2340] border border-white/10 rounded-xl py-5 text-center text-2xl font-black text-white focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all">
                <input type="text" maxlength="1" class="otp-input w-full bg-[#0E2340] border border-white/10 rounded-xl py-5 text-center text-2xl font-black text-white focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all">
                <input type="text" maxlength="1" class="otp-input w-full bg-[#0E2340] border border-white/10 rounded-xl py-5 text-center text-2xl font-black text-white focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all">
            </div>

            <button type="submit" class="btn-primary w-full py-4 text-base font-bold shadow-lg mt-4 bg-teal-600 hover:bg-teal-500 text-white rounded-xl transition-all">
                Verify Identity
            </button>

            <div class="text-center pt-4">
                <button type="button" id="resendBtn" class="text-xs font-bold text-slate-500 hover:text-teal-400 transition-colors uppercase tracking-[0.2em]">Resend Code</button>
            </div>
        </form>
    </div>

    <script src="../js/app.js"></script>
    <script>
        lucide.createIcons();
        setTimeout(() => {
            document.querySelector('.reveal-up').classList.add('visible');
        }, 100);
        
        const inputs = document.querySelectorAll('.otp-input');
        const email = localStorage.getItem('pendingEmail');

        if (!email) window.location.href = 'register.html';

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
        
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="flex items-center justify-center gap-2"><i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Verifying...</span>';
                lucide.createIcons();
                
                const otp = Array.from(inputs).map(i => i.value).join('');
                if (otp.length < 6) throw new Error('Complete the 6-digit sequence.');
                
                const response = await fetch("/api/auth?action=verify", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, otp })
                });

                const text = await response.text();
                const data = text ? JSON.parse(text) : {};

                if (!response.ok) {
                    throw new Error(data.message || 'Verification failed');
                }
                
                alert('Account verified successfully. You can now log in.');
                window.location.href = 'login.html';
            } catch (err) {
                console.error('OTP Error:', err);
                alert(err.message || 'Verification failed.');
                btn.innerHTML = originalText;
                btn.disabled = false;
                lucide.createIcons();
            }
        });

        document.getElementById('resendBtn').addEventListener('click', async (e) => {
            const btn = e.target;
            try {
                btn.disabled = true;
                btn.innerText = 'SENDING...';
                
                const response = await fetch("/api/auth?action=register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, resend: true })
                });

                const text = await response.text();
                const data = text ? JSON.parse(text) : {};

                if (!response.ok) throw new Error(data.message || 'Resend failed');
                
                alert('A new verification code has been sent.');
            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'RESEND CODE';
            }
        });
    </script>
</body>
</html>
