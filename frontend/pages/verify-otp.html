<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Votify</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .verify-card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { margin-bottom: 0.5rem; font-weight: 700; }
        p { color: var(--text-muted); margin-bottom: 2rem; }

        .otp-inputs {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .otp-input {
            width: 3.5rem;
            height: 3.5rem;
            background-color: #334155;
            border: 2px solid #475569;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s;
        }

        .otp-input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .verify-btn {
            width: 100%;
            background-color: var(--accent);
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .verify-btn:hover { opacity: 0.9; }
        .verify-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .resend-text { margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted); }
        .resend-link { color: var(--accent); text-decoration: none; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>
    <div class="verify-card">
        <h2>Email Verification</h2>
        <p>Please enter the 6-digit code sent to your email.</p>
        
        <form id="otpForm">
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
            </div>
            
            <button type="submit" class="verify-btn" id="verifyBtn">Verify Account</button>
        </form>

        <p class="resend-text">Didn't receive code? <span class="resend-link" onclick="resendOTP()">Resend</span></p>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/verify-otp.js"></script>
</body>
</html>
