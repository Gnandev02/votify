<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Access | Votify Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'saas-blue': '#1e3a8a', 'saas-teal': '#14b8a6' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex items-center justify-center p-6 font-inter">

    <div class="max-w-md w-full reveal-up">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 mb-6">
                <div class="w-12 h-12 bg-saas-blue flex items-center justify-center rounded-xl shadow-lg">
                    <i data-lucide="shield-check" class="text-white w-7 h-7"></i>
                </div>
                <span class="text-3xl font-extrabold tracking-tight text-saas-blue">Votify</span>
            </div>
            <h2 class="text-2xl font-bold text-slate-900 mb-2">Security Verification</h2>
            <p class="text-sm text-slate-500 font-medium tracking-wide uppercase">Enter the 6-digit access code</p>
        </div>

        <form id="otpForm" class="saas-card p-10 space-y-8 bg-white">
            <div class="text-center space-y-2">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-[0.15em]">Verification Required</p>
                <p class="text-sm text-slate-600 leading-relaxed">
                    We've sent a 6-digit code to your email address. Please enter it below to continue.
                </p>
            </div>

            <div class="grid grid-cols-6 gap-3" id="otpContainer">
                <input type="text" maxlength="1" class="otp-input w-full bg-slate-50 border border-slate-200 rounded-xl py-5 text-center text-2xl font-black text-saas-blue focus:outline-none focus:border-saas-blue focus:ring-4 focus:ring-blue-500/10 transition-all">
                <input type="text" maxlength="1" class="otp-input w-full bg-slate-50 border border-slate-200 rounded-xl py-5 text-center text-2xl font-black text-saas-blue focus:outline-none focus:border-saas-blue focus:ring-4 focus:ring-blue-500/10 transition-all">
                <input type="text" maxlength="1" class="otp-input w-full bg-slate-50 border border-slate-200 rounded-xl py-5 text-center text-2xl font-black text-saas-blue focus:outline-none focus:border-saas-blue focus:ring-4 focus:ring-blue-500/10 transition-all">
                <input type="text" maxlength="1" class="otp-input w-full bg-slate-50 border border-slate-200 rounded-xl py-5 text-center text-2xl font-black text-saas-blue focus:outline-none focus:border-saas-blue focus:ring-4 focus:ring-blue-500/10 transition-all">
                <input type="text" maxlength="1" class="otp-input w-full bg-slate-50 border border-slate-200 rounded-xl py-5 text-center text-2xl font-black text-saas-blue focus:outline-none focus:border-saas-blue focus:ring-4 focus:ring-blue-500/10 transition-all">
                <input type="text" maxlength="1" class="otp-input w-full bg-slate-50 border border-slate-200 rounded-xl py-5 text-center text-2xl font-black text-saas-blue focus:outline-none focus:border-saas-blue focus:ring-4 focus:ring-blue-500/10 transition-all">
            </div>

            <button type="submit" class="btn-saas-primary w-full py-4 text-base shadow-lg mt-4">
                Verify Identity
            </button>

            <div class="text-center pt-4">
                <button type="button" id="resendBtn" class="text-xs font-bold text-slate-400 hover:text-saas-blue transition-colors uppercase tracking-[0.2em]">Resend Code</button>
            </div>
        </form>
    </div>

    <script src="../js/app.js"></script>
    <script>
        lucide.createIcons();
        document.querySelector('.reveal-up').classList.add('reveal-up-active');
        
        const inputs = document.querySelectorAll('.otp-input');
        const email = localStorage.getItem('pendingEmail');

        if (!email) window.location.href = 'register.html';

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
        
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            try {
                btn.disabled = true;
                btn.innerHTML = 'Verifying...';
                
                const otp = Array.from(inputs).map(i => i.value).join('');
                if (otp.length < 6) throw new Error('Complete the 6-digit sequence.');
                
                await api.post('/auth/verify-otp', { email, otp });
                alert('Account verified successfully. You can now log in.');
                window.location.href = 'login.html';
            } catch (err) {
                alert(err.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        document.getElementById('resendBtn').addEventListener('click', async () => {
            try {
                await api.post('/auth/forgot-password', { email });
                alert('A new verification code has been sent.');
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
